name: CI
on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-snake-duelw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hecate-app-snake-duelw/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build:lib

  daemon:
    name: Daemon (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-snake-dueld
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - name: Cache rebar3 deps
        uses: actions/cache@v4
        with:
          path: |
            hecate-app-snake-dueld/_build/default/lib
            hecate-app-snake-dueld/_build/default/plugins
          key: rebar3-${{ runner.os }}-${{ hashFiles('hecate-app-snake-dueld/rebar.config') }}
          restore-keys: rebar3-${{ runner.os }}-
      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 dialyzer
